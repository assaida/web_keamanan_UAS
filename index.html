<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarSafe Portal - Gatekeeper RBAC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; margin: 0; padding: 0; }
        .auth-wrapper { max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #334155; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        .btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #1d4ed8; }
        .auth-switch { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #64748b; }
        .auth-switch span { color: #2563eb; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <link rel="stylesheet" href="style.css">

    <div class="auth-wrapper">
        <!-- FORM LOGIN -->
        <div id="loginPage" style="display: block;">
            <h2 style="margin-top:0; color:#1e293b; text-align:center;">Sistem Pengajuan Surat Akademik Login</h2>
            <div class="form-group">
                <label>Alamat Email / Username</label>
                <input type="email" id="emailInput" placeholder="Masukkan email...">
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="passwordInput" placeholder="••••••••">
            </div>
            <button class="btn" onclick="executeLogin()">Masuk Ke Sistem</button>
            <div class="auth-switch">Belum punya akun? <span onclick="toggleAuthForm('register')">Daftar Akun Baru</span></div>
        </div>

        <!-- FORM REGISTRASI -->
        <div id="registerPage" style="display: none;">
            <h2 style="margin-top:0; color:#1e293b; text-align:center;">Daftar Akun Baru</h2>
            <div class="form-group">
                <label>Nama Pengguna (Username)</label>
                <input type="text" id="regUsername" placeholder="contoh: hauzatul">
            </div>
            <div class="form-group">
                <label>Alamat Email Baru</label>
                <input type="email" id="regEmail" placeholder="contoh: user@gmail.com">
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="regPassword" placeholder="Minimal 6 karakter">
            </div>
            <div class="form-group">
                <label>Pilih Tingkatan Akses (Role RBAC)</label>
                <select id="regRole">
                    <option value="user">User Biasa</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="btn" style="background-color: #10b981;" onclick="executeRegister()">Daftar Sekarang</button>
            <div class="auth-switch">Sudah punya akun? <span onclick="toggleAuthForm('login')">Login Kembali</span></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ghmbuvtbmqwzurwewcvm.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_2Ble_8dtDi1cl0lxN6xbWQ__2LUDu3U";
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const USER_IP = "192.168.1.10";

        function toggleAuthForm(type) {
            document.getElementById("loginPage").style.display = type === 'register' ? "none" : "block";
            document.getElementById("registerPage").style.display = type === 'register' ? "block" : "none";
        }

        async function executeRegister() {
            const username = document.getElementById("regUsername").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const password = document.getElementById("regPassword").value.trim();
            const role = document.getElementById("regRole").value;

            if (!username || !email || !password) return alert("Semua kolom wajib diisi!");
            if (password.length < 6) return alert("Password minimal 6 karakter!");

            const { error } = await sbClient.auth.signUp({
                email: email, password: password, options: { data: { username: username, role: role } }
            });

            if (error) return alert("Pendaftaran Gagal: " + error.message);
            alert("Akun '" + username + "' berhasil terdaftar di Supabase!");
            toggleAuthForm('login');
        }

        async function executeLogin() {
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();

            if (!email || !password) return alert("Masukkan email dan password!");
            const usernameData = email.split('@')[0];

            // Hitung percobaan gagal untuk logging
            const { data: existingLogs } = await sbClient.from('documents')
                .select('*')
                .eq('username', usernameData)
                .order('id', { ascending: false });

            let failCount = 0;
            if (existingLogs && existingLogs.length > 0) {
                for (let log of existingLogs) {
                    if (log.document_name.includes("Gagal")) { failCount++; } else { break; }
                }
            }

            const { data, error } = await sbClient.auth.signInWithPassword({ email, password });

            // LOGIKA PENCATATAN GAGAL
            if (error) {
                failCount++;
                await sbClient.from('documents').insert([{ document_name: `Gagal|${USER_IP}|${failCount}`, username: usernameData }]);
                return alert(`Login Gagal! Percobaan ke-${failCount} dicatat di server.`);
            }

            // LOGIKA PENCATATAN BERHASIL
            failCount++;
            await sbClient.from('documents').insert([{ document_name: `Berhasil|${USER_IP}|${failCount}`, username: usernameData }]);

            // AMBIL ROLE DARI TABEL PROFILES UTK PENENTUAN ARAH (RBAC REDIRECT)
            const { data: profile } = await sbClient.from('profiles').select('*').eq('id', data.user.id).single();
            const userRole = profile ? profile.role : (email.includes('admin') ? 'admin' : 'user');

            // Simpan data sesi aktif sementara ke LocalStorage
            localStorage.setItem('starsafe_user', JSON.stringify(profile ? profile : { username: usernameData, role: userRole }));

            // ENGINERED REDIRECT HALAMAN SESUAI ROLE MASING-MASING
            if (userRole === 'admin') {
                window.location.href = "admin.html";
            } else {
                window.location.href = "user.html";
            }
        }
    </script>
</body>
</html>
